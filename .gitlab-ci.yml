# GitLab CI: data/ または master/ への push をトリガに集計し HTML を GitLab Pages へ公開
stages:
  - aggregate

pages:
  stage: aggregate
  image: python:3.12-slim
  script:
    - pip install --quiet pandas plotly
    - python ci/aggregate.py
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - data/**/*
        - master/**/*
        - ci/**/*
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
