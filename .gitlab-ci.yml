# GitLab CI: data/ への push をトリガに集計し HTML を GitLab Pages へ公開
stages:
  - aggregate

pages:
  stage: aggregate
  image: python:3.12-slim
  script:
    - pip install --quiet pandas plotly pyyaml
    - python ci/aggregate.py
    - mv public public_out
    - mv public_out public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
